name: Deploy Staging

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote SSH server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Update administrative repo checkout
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" '
            set -e
            cd "${{ secrets.STAGING_REPO_ROOT }}"
            git fetch --all --prune
            git reset --hard origin/master
            git submodule sync --recursive
            git submodule update --init --recursive
          '

      - name: Deploy staging
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" '
            set -e
            export GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            export GHCR_TOKEN="${{ secrets.GHCR_READ_TOKEN }}"
            /bin/bash "${{ secrets.STAGING_REPO_ROOT }}/scripts/deploy/deploy_environment.sh" \
              --track staging \
              --repo-root "${{ secrets.STAGING_REPO_ROOT }}" \
              --git-ref origin/master \
              --ghcr-owner "${{ github.repository_owner }}" \
              --image-tag staging \
              --env-root "${{ secrets.STAGING_ENV_ROOT }}"
          '
