name: Deploy Staging

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote SSH server to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Update administrative repo checkout
        run: |
          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            set -e
            cd "${{ secrets.REPO_ROOT }}"
            git fetch --all --prune
            git reset --hard origin/master
            git submodule sync --recursive
            git submodule update --init --recursive
          '

      - name: Deploy staging
        run: |
          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            set -e
            /bin/bash "${{ secrets.REPO_ROOT }}/scripts/deploy/deploy_environment.sh" \
              --track staging \
              --repo-root "${{ secrets.REPO_ROOT }}" \
              --git-ref origin/master \
              --build-source local
          '
