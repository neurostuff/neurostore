name: Production Regression Workflow

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to compare against (defaults to the repository default branch)"
        required: false
        type: string
      iterations:
        description: "Iterations per endpoint benchmark (5-10 recommended)"
        required: false
        default: "5"
        type: string

permissions:
  contents: read

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        service: [store, compose]
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - name: Checkout head
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve base ref
        id: base_ref
        shell: bash
        run: |
          set -euo pipefail
          BASE_REF_INPUT="${{ github.event.inputs.base_ref }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${BASE_REF_INPUT}" ]; then
            echo "ref=${BASE_REF_INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.repository.default_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch base ref
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ steps.base_ref.outputs.ref }}"

      - name: Resolve iterations
        shell: bash
        run: |
          set -euo pipefail
          ITERATIONS="${{ github.event.inputs.iterations }}"
          if [ -z "${ITERATIONS}" ]; then
            ITERATIONS="5"
          fi
          echo "ITERATIONS=${ITERATIONS}" >> "$GITHUB_ENV"

      - name: Create base worktree
        shell: bash
        run: |
          set -euo pipefail
          BASE_DIR="${RUNNER_TEMP}/production-regression-base"
          git worktree add --force "${BASE_DIR}" FETCH_HEAD
          echo "BASE_DIR=${BASE_DIR}" >> "$GITHUB_ENV"

      - name: Benchmark base branch
        shell: bash
        run: |
          set -euo pipefail
          "./scripts/production_regression/run_service_suite.sh" \
            --service "${{ matrix.service }}" \
            --label "base-${{ matrix.service }}" \
            --iterations "${ITERATIONS}" \
            --project-name "prodreg-${{ matrix.service }}-base" \
            --target-repo-root "${BASE_DIR}"

      - name: Benchmark pull request branch
        shell: bash
        run: |
          set -euo pipefail
          "./scripts/production_regression/run_service_suite.sh" \
            --service "${{ matrix.service }}" \
            --label "head-${{ matrix.service }}" \
            --iterations "${ITERATIONS}" \
            --project-name "prodreg-${{ matrix.service }}-head"

      - name: Compare timings
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/production_regression/compare_results.py \
            --baseline "${BASE_DIR}/${{ matrix.service }}/.regression-artifacts/base-${{ matrix.service }}.json" \
            --candidate "${{ github.workspace }}/${{ matrix.service }}/.regression-artifacts/head-${{ matrix.service }}.json" \
            --threshold 0.2 \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-regression-${{ matrix.service }}
          path: |
            ${{ github.workspace }}/${{ matrix.service }}/.regression-artifacts/head-${{ matrix.service }}.json
            ${{ env.BASE_DIR }}/${{ matrix.service }}/.regression-artifacts/base-${{ matrix.service }}.json

      - name: Cleanup base worktree
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git worktree remove --force "${BASE_DIR}" || true
